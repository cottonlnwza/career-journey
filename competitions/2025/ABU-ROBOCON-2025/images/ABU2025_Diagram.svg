  <text x="608" y="300" text-anchor="middle" font-size="10" fill="#27500A" style="fill:rgb(39, 80, 10);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:10px;font-weight:400;text-anchor:middle;dominant-baseline:auto">DC Motor</text>
  <text x="608" y="314" text-anchor="middle" font-size="10" fill="#27500A" style="fill:rgb(39, 80, 10);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:10px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Limit Switch</text>

